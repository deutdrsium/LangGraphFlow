<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LangGraph React Flow UI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://esm.sh/reactflow@11.10.1/dist/style.css" />
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "reactflow": "https://esm.sh/reactflow@11.10.1?deps=react@18.2.0,react-dom@18.2.0"
      }
    }
  </script>
</head>
<body class="bg-gray-50 h-screen w-screen m-0 p-0 overflow-hidden font-sans">
  <div id="root" class="w-full h-full"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback, useRef } from 'react';
    import { createRoot } from 'react-dom/client';
    import ReactFlow, { Background, Controls, applyNodeChanges, applyEdgeChanges, MarkerType } from 'reactflow';

    const INITIAL_NODES = [
      { id: '__start__', data: { label: 'START' }, position: { x: 300, y: 30 }, type: 'input' },
      { id: 'trap_check', data: { label: 'Trap Check' }, position: { x: 300, y: 120 } },
      { id: 'solve', data: { label: 'Solve' }, position: { x: 300, y: 230 } },
      { id: 'code_executor', data: { label: 'Code Executor' }, position: { x: 300, y: 340 } },
      { id: 'judge', data: { label: 'Judge' }, position: { x: 300, y: 440 } },
      { id: 'retry_solve', data: { label: 'Retry Solve' }, position: { x: 550, y: 440 } },
      { id: 'retry_executor', data: { label: 'Retry Executor' }, position: { x: 550, y: 540 } },
      { id: 'retry_judge', data: { label: 'Retry Judge' }, position: { x: 550, y: 640 } },
      { id: 'human_review', data: { label: 'Human Review (HITL)' }, position: { x: 300, y: 700 } },
      { id: '__end__', data: { label: 'END' }, position: { x: 300, y: 810 }, type: 'output' }
    ];

    const INITIAL_EDGES = [
      { id: 'e-start-trap', source: '__start__', target: 'trap_check', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-trap-solve', source: 'trap_check', target: 'solve', label: 'solvable', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-trap-end', source: 'trap_check', target: '__end__', label: 'unsolvable', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-solve-exec', source: 'solve', target: 'code_executor', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-exec-judge', source: 'code_executor', target: 'judge', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-judge-end', source: 'judge', target: '__end__', label: 'Match', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-judge-retry', source: 'judge', target: 'retry_solve', label: 'Mismatch', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-judge-human', source: 'judge', target: 'human_review', label: 'low conf', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-retry-exec', source: 'retry_solve', target: 'retry_executor', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-retryexec-judge', source: 'retry_executor', target: 'retry_judge', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-retryjudge-end', source: 'retry_judge', target: '__end__', label: 'consistent', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-retryjudge-human', source: 'retry_judge', target: 'human_review', label: 'inconsistent', markerEnd: { type: MarkerType.ArrowClosed } },
      { id: 'e-human-end', source: 'human_review', target: '__end__', markerEnd: { type: MarkerType.ArrowClosed } }
    ];

    function getColorForStatus(status) {
      if (status === 'executing') return '#ffa500'; // Orange
      if (status === 'success') return '#4ade80'; // Green
      if (status === 'blocked') return '#f87171'; // Red
      if (status === 'error') return '#dc2626'; // Dark Red
      return '#ffffff'; // White default
    }

    function GraphInstance({ instanceId, initialSession, onThreadIdChange }) {
      const [nodes, setNodes] = useState(INITIAL_NODES);
      const [edges, setEdges] = useState(INITIAL_EDGES);
      
      const [threadId, setThreadId] = useState(initialSession ? initialSession.thread_id : null);
      const [selectedNode, setSelectedNode] = useState(null);
      const [nodeData, setNodeData] = useState({});
      
      const [question, setQuestion] = useState(initialSession ? initialSession.question : "");
      const [truth, setTruth] = useState(initialSession ? initialSession.truth : "");
      const [statusPoller, setStatusPoller] = useState(null);
      
      const [sessionStatus, setSessionStatus] = useState(initialSession ? initialSession.status : 'idle'); // idle, running, blocked, finished, error
      const [autoMode, setAutoMode] = useState(!initialSession);
      const [taskId, setTaskId] = useState(initialSession ? initialSession.task_id : "");

      const onNodesChange = useCallback(
        (changes) => setNodes((nds) => applyNodeChanges(changes, nds)),
        []
      );
      const onEdgesChange = useCallback(
        (changes) => setEdges((eds) => applyEdgeChanges(changes, eds)),
        []
      );

      const runGraph = async (q = question, t = truth, tid = taskId) => {
        if (!q || !q.trim()) return;
        try {
          setSessionStatus('running');
          const res = await fetch('/api/run', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: q, truth: t, task_id: tid })
          });
          const data = await res.json();
          if (onThreadIdChange) onThreadIdChange(instanceId, data.thread_id);
          setThreadId(data.thread_id);
          setNodeData({});
          
          // Reset nodes
          setNodes((nds) => nds.map(n => ({ ...n, style: { backgroundColor: '#ffffff' } })));
        } catch (e) {
          alert('Error starting graph');
          setSessionStatus('error');
        }
      };

      const stopGraph = async () => {
        if (!taskId && !threadId) return;
        try {
          if (taskId) {
            await fetch('/api/cancel_task', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ task_id: taskId })
            });
          }
          setSessionStatus('idle');
          setThreadId(null);
          setNodes(INITIAL_NODES);
          setNodeData({});
          setSelectedNode(null);
        } catch (e) {
          console.error('Error stopping graph');
        }
      };

      const retryGraph = async () => {
        if (!question || !question.trim()) return;
        // 先停掉当前的
        if (taskId) {
          try {
            await fetch('/api/cancel_task', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ task_id: taskId })
            });
          } catch (e) {}
        }
        setThreadId(null);
        setNodes(INITIAL_NODES);
        setNodeData({});
        setSelectedNode(null);
        // 重新跑
        runGraph(question, truth, taskId);
      };

      const resumeGraph = async (decision) => {
        try {
          await fetch(`/api/resume/${threadId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ decision })
          });
          // Close panel if open
          setSelectedNode(null);
        } catch (e) {
          alert('Error resuming graph');
        }
      };

      // Poll status
      useEffect(() => {
        if (!threadId) return;
        const interval = setInterval(async () => {
          try {
            const res = await fetch(`/api/status/${threadId}?_t=${Date.now()}`);
            if (res.ok) {
              const data = await res.json();
              setSessionStatus(data.status);
            
              // Update Nodes with colors and duration
              setNodes((nds) => nds.map(n => {
                const nodeInfo = data.nodes[n.id];
                let color = '#ffffff';
                let durationLabel = '';
                if (nodeInfo) {
                   color = getColorForStatus(nodeInfo.status);
                   if (nodeInfo.duration != null) {
                     durationLabel = ` (${nodeInfo.duration}s)`;
                   } else if (nodeInfo.status === 'executing' && nodeInfo.start_time) {
                     const elapsed = ((Date.now() / 1000) - nodeInfo.start_time).toFixed(0);
                     durationLabel = ` (${elapsed}s...)`;
                   }
                }
                // Find the original label from INITIAL_NODES
                const originalNode = INITIAL_NODES.find(on => on.id === n.id);
                const baseLabel = originalNode ? originalNode.data.label : n.id;
                return { ...n, data: { ...n.data, label: baseLabel + durationLabel }, style: { backgroundColor: color } };
              }));

              // Sync data
              setNodeData(data.nodes || {});
              
              if (data.status === 'cancelled') {
                clearInterval(interval);
                // 只有接收到取消或清空命令时，才重置实例
                setSessionStatus('idle');
                setThreadId(null);
                setQuestion('');
                setTruth('');
                setTaskId('');
                setNodes(INITIAL_NODES);
                setNodeData({});
                setSelectedNode(null); // 关闭侧边栏面板以防显示无意义数据
              }
              // 如果是 finished 或 error，让它继续 polling 或根据需要处理，这样才能收到后续发来的 cancelled 状态
            }
          } catch (e) {
            console.error("Error polling status");
          }
        }, 1000);
        return () => clearInterval(interval);
      }, [threadId]);

      // Auto poll for tasks
      useEffect(() => {
        if (!autoMode || sessionStatus !== 'idle') return;
        
        let active = true;
        const poller = setInterval(async () => {
          if (!active) return;
          try {
            const res = await fetch(`/api/get_task?_t=${Date.now()}`);
            if (res.ok) {
              const data = await res.json();
              if (data.has_task && data.task) {
                setQuestion(data.task.question_content);
                setTruth(data.task.answer);
                setTaskId(data.task.task_id);
                clearInterval(poller);
                // Start execution
                runGraph(data.task.question_content, data.task.answer, data.task.task_id);
              }
            }
          } catch (e) {
            console.error("Error fetching task");
          }
        }, 2000 + Math.random() * 1000); // Stagger polling slightly to prevent thunderherd
        
        return () => { active = false; clearInterval(poller); };
      }, [autoMode, sessionStatus]);

      // Report threadId to parent so App can track ownership
      useEffect(() => {
        if (onThreadIdChange) onThreadIdChange(instanceId, threadId);
      }, [instanceId, threadId, onThreadIdChange]);

      const onNodeClick = (_, node) => {
        setSelectedNode(node.id);
      };

      // Initialize with existing session data if available
      useEffect(() => {
        if (initialSession && initialSession.thread_id) {
          if (initialSession.thread_id !== threadId) {
            setThreadId(initialSession.thread_id);
            setSessionStatus(initialSession.status);
            setNodeData(initialSession.nodes || {});
            setTaskId(initialSession.task_id || "");

            // Update nodes and edges based on initial session data
            const updatedNodes = INITIAL_NODES.map(node => {
              const nodeInfo = (initialSession.nodes || {})[node.id];
              return {
                ...node,
                style: { backgroundColor: getColorForStatus(nodeInfo?.status || '') },
                data: { ...node.data, ...nodeInfo?.data }
              };
            });
            const updatedEdges = INITIAL_EDGES.map(edge => {
              const edgeInfo = initialSession.edges?.find(e => e.id === edge.id); 
              return {
                ...edge,
                animated: edgeInfo?.status === 'executing',
                label: edgeInfo?.label || edge.label
              };
            });
            setNodes(updatedNodes);
            setEdges(updatedEdges);
          }
        } else if (!initialSession && threadId && sessionStatus !== 'running') {
            // If the backend has dropped this session from active slots, and we are not actively running, reset to idle
            setSessionStatus('idle');
            setThreadId(null);
            setQuestion('');
            setTruth('');
            setTaskId('');
            setNodes(INITIAL_NODES);
            setNodeData({});
            setSelectedNode(null); 
        }
      }, [initialSession, threadId, sessionStatus]);

      return (
        <div className="flex w-full h-full overflow-hidden border flex-col">
          <div className="flex bg-gray-100 p-1 justify-between items-center text-[10px] border-b">
            <div>
              <span className={`font-bold mr-2 ${sessionStatus === 'error' ? 'text-red-600' : ''}`}>State: {sessionStatus}</span>
              {taskId && <span className="text-blue-600 truncate max-w-[100px] inline-block align-bottom">ID: {taskId}</span>}
            </div>
            <div className="flex items-center space-x-1">
              {(sessionStatus === 'running' || sessionStatus === 'blocked') && (
                <button onClick={stopGraph} className="bg-red-500 text-white px-1.5 rounded hover:bg-red-600" title="停止">Stop</button>
              )}
              {(sessionStatus === 'error' || sessionStatus === 'finished') && question && (
                <button onClick={retryGraph} className="bg-blue-500 text-white px-1.5 rounded hover:bg-blue-600" title="重试">Retry</button>
              )}
              <label className="flex items-center space-x-1 cursor-pointer">
                <input type="checkbox" checked={autoMode} onChange={e => setAutoMode(e.target.checked)} />
                <span>Auto</span>
              </label>
            </div>
          </div>
          <div className="flex w-full flex-1 overflow-hidden">
            <div className="flex-1 relative">
               <ReactFlow
                nodes={nodes}
                edges={edges}
                onNodesChange={onNodesChange}
                onEdgesChange={onEdgesChange}
                onNodeClick={onNodeClick}
                fitView
                attributionPosition="bottom-right"
                id={`reactflow-${instanceId}`}
              >
                <Background />
                <Controls showInteractive={false} />
              </ReactFlow>
            </div>
            
            {selectedNode && (
              <div className="w-1/2 bg-white border-l h-full overflow-y-auto p-2 flex flex-col shadow-lg z-50 text-xs">
                <div className="flex justify-between items-center mb-2">
                  <h2 className="font-bold">Node: {selectedNode}</h2>
                  <button onClick={() => setSelectedNode(null)} className="text-red-500 font-bold">X</button>
                </div>
                
                {selectedNode === '__start__' && (
                  <div className="mb-2 space-y-2">
                    <p><strong>Input Question & Truth</strong></p>
                    <textarea 
                      value={question} 
                      onChange={e => setQuestion(e.target.value)}
                      className="w-full border p-1 text-xs"
                      rows="3"
                      placeholder="Enter mathematical question..."
                    />
                    <input 
                      value={truth} 
                      onChange={e => setTruth(e.target.value)}
                      className="w-full border p-1 text-xs" 
                      placeholder="Ground Truth"
                    />
                    <input 
                      value={taskId} 
                      onChange={e => setTaskId(e.target.value)}
                      className="w-full border p-1 text-xs" 
                      placeholder="Task ID"
                    />
                    <button 
                      onClick={() => runGraph()} 
                      className="bg-blue-600 text-white rounded px-2 py-1 w-full hover:bg-blue-700"
                    >
                      Run Graph
                    </button>
                  </div>
                )}
              
              {selectedNode === 'human_review' && nodeData['human_review']?.status === 'blocked' && (
                <div className="mb-2 bg-red-50 p-2 border border-red-200">
                  <p className="font-bold text-red-600 mb-1">Needs Human Review!</p>
                  <p className="text-xs text-gray-700 mb-2">Model execution finished but confidence or output needs review.</p>
                  <button onClick={() => resumeGraph('Manual_Confirmed_Match')} className="bg-green-600 text-white px-2 py-1 mr-1 rounded hover:bg-green-700">Approve</button>
                  <button onClick={() => resumeGraph('Manual_Overruled_Mismatch')} className="bg-red-600 text-white px-2 py-1 rounded hover:bg-red-700">Reject</button>
                </div>
              )}

              {nodeData[selectedNode]?.status === 'error' && (
                <div className="mb-2 bg-red-50 p-2 border border-red-300 rounded">
                  <p className="font-bold text-red-700 mb-1">Node Error</p>
                  <p className="text-xs text-red-600 break-words">{nodeData[selectedNode]?.data?.error || 'Unknown error'}</p>
                </div>
              )}
              
              <div className="mt-2 break-words">
                <h3 className="font-semibold border-b pb-1">Data</h3>
                {selectedNode === '__end__' && nodeData['__end__']?.data ? (
                  <div className="mt-2 space-y-3 bg-gray-50 p-3 rounded border">
                    {(nodeData['__end__'].data.trap_analysis === true || nodeData['__end__'].data.trap_reason) ? (
                      <>
                        {nodeData['__end__'].data.trap_analysis !== undefined && (
                          <div>
                            <p className="font-bold text-sm text-gray-700">Trap Analysis:</p>
                            <p className="text-sm">{String(nodeData['__end__'].data.trap_analysis)}</p>
                          </div>
                        )}
                        {nodeData['__end__'].data.trap_reason && (
                          <div>
                            <p className="font-bold text-sm text-gray-700">Trap Reason:</p>
                            <p className="text-sm">{nodeData['__end__'].data.trap_reason}</p>
                          </div>
                        )}
                      </>
                    ) : (
                      <>
                        {nodeData['__end__'].data.confidence_score !== undefined && (
                          <div>
                            <p className="font-bold text-sm text-gray-700">Confidence Score:</p>
                            <p className="text-sm">{nodeData['__end__'].data.confidence_score}</p>
                          </div>
                        )}
                        {nodeData['__end__'].data.final_decision && (
                          <div>
                            <p className="font-bold text-sm text-gray-700">Final Decision:</p>
                            <p className="text-sm">{nodeData['__end__'].data.final_decision}</p>
                          </div>
                        )}
                        {nodeData['__end__'].data.final_decision && nodeData['__end__'].data.final_decision.toLowerCase().includes('mismatch') && nodeData['__end__'].data.verified_ans && (
                          <div>
                            <p className="font-bold text-sm text-gray-700">Verified Answer:</p>
                            <p className="text-sm">{nodeData['__end__'].data.verified_ans}</p>
                          </div>
                        )}
                      </>
                    )}
                  </div>
                ) : nodeData[selectedNode] && nodeData[selectedNode].data ? (
                  <pre className="bg-gray-100 p-1 text-[10px] overflow-x-auto mt-2 whitespace-pre-wrap">
                    {nodeData[selectedNode].data.streaming_content 
                      ? nodeData[selectedNode].data.streaming_content 
                      : (typeof nodeData[selectedNode].data === "string" 
                          ? nodeData[selectedNode].data 
                          : JSON.stringify(nodeData[selectedNode].data, null, 2))}
                  </pre>
                ) : (
                  <p className="text-gray-500 text-xs italic mt-2">No data yet.</p>
                )}
              </div>
            </div>
          )}
          </div>
        </div>
      );
    }

    function App() {
      const [initialSessions, setInitialSessions] = useState([]);
      const [loaded, setLoaded] = useState(false);
      const instanceThreadIdsRef = useRef({});

      const handleThreadIdChange = useCallback((instanceId, threadId) => {
        if (threadId) {
          instanceThreadIdsRef.current[instanceId] = threadId;
        } else {
          delete instanceThreadIdsRef.current[instanceId];
        }
      }, []);

      useEffect(() => {
        const fetchActive = () => {
          fetch(`/api/active_sessions?_t=${Date.now()}`)
            .then(res => res.json())
            .then(data => {
              const allSessions = data.sessions || [];
              const claimed = instanceThreadIdsRef.current;
              const claimedSet = new Set(Object.values(claimed));

              const result = new Array(8).fill(null);

              // First pass: place sessions into their claimed instance slots
              for (const [idStr, tid] of Object.entries(claimed)) {
                const session = allSessions.find(s => s.thread_id === tid);
                if (session) {
                  result[parseInt(idStr)] = session;
                }
              }

              // Second pass: distribute unclaimed sessions into empty slots
              const unclaimed = allSessions.filter(s => !claimedSet.has(s.thread_id));
              let ui = 0;
              for (let i = 0; i < 8 && ui < unclaimed.length; i++) {
                if (!result[i]) {
                  result[i] = unclaimed[ui++];
                }
              }

              setInitialSessions(result);
              if (!loaded) setLoaded(true);
            })
            .catch(e => {
              console.error(e);
              if (!loaded) setLoaded(true);
            });
        };

        fetchActive();
        const interval = setInterval(fetchActive, 2000);
        return () => clearInterval(interval);
      }, [loaded]);

      if (!loaded) return <div className="p-4">Loading active instances...</div>;

      // Setup grid of 8 GraphInstances
      return (
        <div className="grid grid-cols-4 grid-rows-2 w-full h-full bg-gray-200 gap-1 p-1">
          {Array.from({ length: 8 }).map((_, i) => (
            <div key={i} className="bg-white rounded shadow flex flex-col h-full overflow-hidden relative">
              <div className="bg-gray-800 text-white text-xs font-bold p-1 flex justify-between">
                <span>Instance {i + 1}</span>
              </div>
              <div className="flex-1 overflow-hidden relative">
                <GraphInstance instanceId={i} initialSession={initialSessions[i] || null} onThreadIdChange={handleThreadIdChange} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
